<!doctype html>
<html lang="nl">
  <head>
    <meta charset="UTF-8" />
    <title>Car Import Cost</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <header>
      <h1>Importkosten NL</h1>
      <nav class="tabs" role="tablist">
        <button
          class="tab active"
          role="tab"
          data-tab="calc"
          aria-selected="true"
        >
          Berekening
        </button>
        <button
          class="tab"
          role="tab"
          data-tab="settings"
          aria-selected="false"
        >
          Instellingen
        </button>
      </nav>
    </header>

    <main>
      <!-- Tab: Manual calculation -->
      <section class="tab-panel" id="tab-calc">
        <label for="carPrice">Vraagprijs (&#x20AC;)</label>
        <input type="number" id="carPrice" placeholder="bijv. 15000" min="0" />

        <label>Eerste registratie</label>
        <div class="row-inline">
          <select id="regMonth">
            <option value="">Maand</option>
            <option value="1">Jan</option>
            <option value="2">Feb</option>
            <option value="3">Mrt</option>
            <option value="4">Apr</option>
            <option value="5">Mei</option>
            <option value="6">Jun</option>
            <option value="7">Jul</option>
            <option value="8">Aug</option>
            <option value="9">Sep</option>
            <option value="10">Okt</option>
            <option value="11">Nov</option>
            <option value="12">Dec</option>
          </select>
          <input
            type="number"
            id="regYear"
            placeholder="Jaar"
            min="1990"
            max="2035"
            style="width: 80px"
          />
        </div>

        <label for="fuelType">Brandstof</label>
        <select id="fuelType">
          <option value="petrol">Benzine</option>
          <option value="diesel">Diesel</option>
          <option value="electric">Elektrisch</option>
          <option value="hybrid">Hybride</option>
        </select>

        <label for="co2">CO&#x2082; <span class="unit">g/km</span></label>
        <input
          type="number"
          id="co2"
          placeholder="bijv. 138"
          min="0"
          max="400"
        />

        <label for="calcCountry">Herkomstland</label>
        <select id="calcCountry">
          <option value="DE">Duitsland</option>
          <option value="BE">Belgi&#235;</option>
          <option value="FR">Frankrijk</option>
        </select>

        <button id="calculateBtn">Bereken</button>

        <div class="results" id="results" hidden>
          <h2>Kostenopbouw</h2>
          <table id="results-table"></table>
          <p id="r-note" class="note"></p>
        </div>
      </section>

      <!-- Tab: Settings -->
      <section class="tab-panel hidden" id="tab-settings">
        <label for="fixedCosts">Vaste kosten (RDW, administratiekosten, etc.) (&#x20AC;)</label>
        <input type="number" id="fixedCosts" placeholder="200" min="0" />

        <h3 class="settings-section-title">
          Transportkosten per land (&#x20AC;)
        </h3>
        <p class="hint">
          Vaste kosten per herkomstland
        </p>

        <div class="transport-grid">
          <label for="t-DE">Duitsland</label>
          <input type="number" id="t-DE" min="0" />
          <label for="t-BE">Belgi&#235;</label>
          <input type="number" id="t-BE" min="0" />
          <label for="t-FR">Frankrijk</label>
          <input type="number" id="t-FR" min="0" />
        </div>

        <button id="resetSettingsBtn" class="btn-secondary">
          Herstel standaard
        </button>
      </section>
    </main>

    <script src="../content/calculators/bpm.js"></script>
    <script type="module" src="popup.js"></script>
  </body>
</html>
