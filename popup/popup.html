<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <title>Car Import Cost</title>
  <link rel="stylesheet" href="popup.css" />
</head>
<body>
  <header>
    <h1>🇳🇱 Import Kosten NL</h1>
  </header>

  <main>
    <!-- Instellingen -->
    <section class="section">
      <h2>Instellingen</h2>
      <label class="checkbox-label">
        <input type="checkbox" id="originOutsideEU" />
        Auto van buiten de EU (+ 6,5% invoerrechten)
      </label>
    </section>

    <!-- Handmatige berekening -->
    <section class="section">
      <h2>Handmatige berekening</h2>

      <label for="carPrice">Vraagprijs (€)</label>
      <input type="number" id="carPrice" placeholder="bijv. 15000" min="0" />

      <label for="carYear">Bouwjaar</label>
      <input type="number" id="carYear" placeholder="bijv. 2019" min="1990" max="2030" />

      <label for="fuelType">Brandstof</label>
      <select id="fuelType">
        <option value="petrol">Benzine</option>
        <option value="diesel">Diesel</option>
        <option value="electric">Elektrisch</option>
        <option value="hybrid">Hybride</option>
      </select>

      <label for="co2">CO₂ g/km <span class="optional">(optioneel)</span></label>
      <input type="number" id="co2" placeholder="bijv. 138" min="0" max="400" />

      <button id="calculateBtn">Bereken</button>
    </section>

    <!-- Resultaat -->
    <section class="section results" id="results" hidden>
      <h2>Kostenopbouw</h2>
      <div class="row"><span>Vraagprijs</span>       <span id="r-price">—</span></div>
      <div class="row"><span>Invoerrechten</span>    <span id="r-duty">—</span></div>
      <div class="row"><span>BTW (21%)</span>        <span id="r-vat">—</span></div>
      <div class="row"><span>BPM</span>              <span id="r-bpm">—</span></div>
      <div class="row total"><span>Totaal</span>     <span id="r-total">—</span></div>
      <p id="r-note" class="note"></p>
    </section>
  </main>

  <script type="module" src="popup.js"></script>
</body>
</html>
